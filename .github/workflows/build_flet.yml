name: Автоматическая сборка релизов ZPay Games Store (APK и EXE)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  UV_PYTHON: "3.11"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

jobs:
  build:
    name: Сборка ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runner: windows-latest
            artifact_path: dist/zpay-games-store.exe

          - name: apk
            runner: ubuntu-latest
            artifact_path: build/zpay-games-store.apk

    steps:
      - uses: actions/checkout@v4

      - name: Настройка Java (только для Android)
        if: matrix.name == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Настройка uv
        uses: astral-sh/setup-uv@v6

      - name: Сборка Windows (PyInstaller)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          uv run --with "flet[desktop]" --with pandas --with openpyxl --with "pyinstaller==6.3.0" pyinstaller --noconsole --onefile --collect-all flet --collect-all flet_desktop --name "zpay-games-store" main.py

      - name: Сборка Android (Flet CLI)
        if: matrix.name == 'apk'
        shell: bash
        run: |
          uv run --with flet --with pandas --with openpyxl flet build apk . -o build/apk --yes --verbose

      - name: Переименование APK
        if: matrix.name == 'apk'
        shell: bash
        run: |
          mv build/apk/*.apk build/zpay-games-store.apk

      - name: Сохранение артефакта
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifact
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Скачивание всех сборок
        uses: actions/download-artifact@v4
        with:
          pattern: '*-artifact'
          merge-multiple: true

      - name: Публикация релиза на GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zpay-games-store.exe
            zpay-games-store.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
