name: Build Flet GUI Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 1. Клонируем репозиторий
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Настраиваем Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Обновляем pip и устанавливаем зависимости проекта
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Устанавливаем инструмент сборки Flet Pack
    - name: Install Flet Pack Tool
      run: |
        pip install pyinstaller

    # 5. Собираем GUI приложение
    # Флаг --noconsole скрывает черное окно терминала при старте, оставляя только красивый интерфейс
    - name: Build EXE with Flet Pack
      run: |
        flet pack main.py --noconsole --name "ZPay_Games_Store"

    # 6. Загружаем готовый .exe в артефакты репозитория
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZPay_Games_Store_Windows
        path: dist/ZPay_Games_Store.exe
