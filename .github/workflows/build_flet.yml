name: Build Python App

# Скрипт запускается при пуше в ветку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Собираем на Windows (если нужен .exe). Для Linux используйте ubuntu-latest
    runs-on: windows-latest

    steps:
    # 1. Скачиваем код из репозитория
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Устанавливаем Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Укажите вашу версию Python

    # 3. Устанавливаем зависимости и PyInstaller
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    # 4. Собираем приложение в один файл
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile main.py

    # 5. Сохраняем готовый файл в артефакты GitHub
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-python-app-windows
        path: dist/main.exe
