name: Build Flet GUI Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Перечисляем все нужные библиотеки вручную прямо здесь
        pip install "flet[cli]" pandas openpyxl pyinstaller

    - name: Build EXE with Flet Pack
      run: |
        flet pack main.py --noconsole --name "ZPay_Games_Store"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZPay_Games_Store_Windows
        path: dist/ZPay_Games_Store.exe
